# =============================================================================
# Kano Shared Toolchain — Global Pixi Manifest
# =============================================================================
# This manifest defines the canonical shared toolchain for all Kano projects.
# Install via: pixi global install -m <path-to-this-file>
#
# Philosophy: global-first. All projects share the same tools by default.
# Project-local pixi.toml is only needed when a specific project requires
# a different version or additional specialized tools.
# =============================================================================

version = 1

[envs.default]
channels = ["conda-forge"]

dependencies = {
    ccache = "*",
    cmake = ">=3.21",
    git = "*",
    ninja = ">=1.13.2,<2",
    python = ">=3.11",
    ripgrep = "*",
}

# Platform-specific pypi packages
[target.win-64.pypi-dependencies]
jq = "*"

[target.linux-64.pypi-dependencies]
jq = "*"

[target.osx-64.pypi-dependencies]
jq = "*"

[target.osx-arm64.pypi-dependencies]
jq = "*"