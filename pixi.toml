test-report = "bash scripts/stages/test-report.sh"
pgo-rebuild = "bash scripts/workflows/pgo-rebuild.sh"

# Full coverage workflow: build + test + report
coverage-all = "bash scripts/workflows/coverage-all.sh"

# Tests
quick-test = "bash ../../../code/tests/run_tests.sh linux-ninja-gcc-release"
full-test = "bash ../../../code/tests/run_tests.sh linux-ninja-gcc-release --with-e2e"

