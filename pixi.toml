[workspace]
name = "kano-cpp-infra"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

# NOTE: Core toolchain (ccache, cmake, git, ninja, ripgrep) is now managed
# via pixi-global-tool.toml and installed globally. Do NOT add them here.

# =============================================================================
# CANONICAL SHARED-INFRA PIXI CONTRACT (src/cpp/shared/infra/)
# =============================================================================
# This manifest is the canonical shared Pixi entrypoint for reusable native
# build / test / report / bootstrap flows. Consuming repos should prefer:
#
#   cd src/cpp/shared/infra && pixi run <task>
#   pixi run --manifest-path src/cpp/shared/infra/pixi.toml <task>
#
# Repo-root pixi usage is reserved for repo-specific extension tasks only.
# Do not move repo-specific docs / release / acceptance flows into this manifest.
# =============================================================================

[tasks]

# Show toolchain versions
env-summary = "git --version && cmake --version && ninja --version"

# Package all reports (test + coverage) via kano-cpp-test-skill
package-reports = "bash scripts/lib/package-reports-with-skill.sh"

# CI/reporting contract:
# - coverage-all is the canonical coverage lane when a job needs build + gather
#   + report together.
# - pgo-gather and pgo-rebuild are the canonical release PGO lanes.
# - pgo-gather-with-coverage is optional and only valid for supported unified
#   coverage/PGO backends; it is not the default CI lane.
# - build-coverage / test-coverage / coverage-report remain available as split
#   stage seams, but coverage-report alone is render-only and does not replace
#   coverage-all when a job must also build and gather evidence.
#
# Linux CI host-routing:
# - ci-linux-* tasks stay at top-level on purpose so a Linux branch can run on
#   a native Linux node or any Docker-capable host.
# - ci-linux-build / ci-linux-quick-test / ci-linux-test-report /
#   ci-linux-coverage-all / ci-linux-export are the Jenkins-facing contract for
#   Linux-on-docker branches. They do not replace the normal per-platform tasks.

# Linux CI host-routed tasks (native on Linux, Docker otherwise)
ci-linux-build = "bash scripts/platform/linux/ci-build.sh"
ci-linux-quick-test = "bash scripts/platform/linux/ci-quick-test.sh"
ci-linux-test-report = "bash scripts/platform/linux/ci-test-report.sh"
ci-linux-coverage-all = "bash scripts/platform/linux/ci-coverage-all.sh"
ci-linux-export = "bash scripts/platform/linux/ci-export.sh"

# Profiling matrices — runs a curated feature-combination matrix then renders report
# profile-default   : launcher=none vs ccache vs sccache vs fastbuild
# profile-launchers : launcher comparisons only
# profile-unity     : unity=off vs full vs changed
# profile-pgo       : baseline vs pgo
profile-default = "bash scripts/stages/profile.sh default && bash scripts/stages/profile-report.sh default"
profile-launchers = "bash scripts/stages/profile.sh launchers && bash scripts/stages/profile-report.sh launchers"
profile-unity = "bash scripts/stages/profile.sh unity && bash scripts/stages/profile-report.sh unity"
profile-pgo = "bash scripts/stages/profile.sh pgo && bash scripts/stages/profile-report.sh pgo"

[target.win-64.activation]
scripts = ["scripts/win64-activate.bat"]

[target.win-64.tasks]
# Bootstrap
bootstrap-system = "bash scripts/platform/win64/prerequisite.ps1"
ensure-coverage-tools = "bash scripts/stages/ensure-coverage-tools.sh"

# Development build (Debug preset - fast iteration)
build-debug = "bash scripts/self/build-debug.sh"

# Release build (optimized)
build-release = "bash scripts/self/build.sh"
build = "bash scripts/self/build.sh"
rebuild = "bash scripts/self/rebuild.sh"

# Coverage workflow (CI-ready)
build-coverage = "bash scripts/stages/coverage-build.sh"
test-coverage = "bash scripts/stages/coverage-gather.sh"
report-coverage = "bash scripts/stages/coverage-report.sh"
coverage-report = "bash scripts/stages/coverage-report.sh"
report-coverage-opencppcoverage = "bash scripts/platform/win64/ninja-msvc-coverage-build.sh"
skill-report-coverage = "bash scripts/stages/coverage-report.sh"
skill-report-coverage-opencppcoverage = "bash scripts/stages/coverage-report.sh opencppcoverage"
test-report = "bash scripts/stages/test-report.sh"
gather-reports = "bash scripts/lib/package-reports-with-skill.sh"
pgo-gather = "KANO_CXX_PROFILE_RUN_MODE=pgo-gather KANO_CPP_INFRA_PGO_REBUILD_SKIP_USE=1 bash scripts/workflows/pgo-rebuild.sh"
pgo-rebuild = "bash scripts/workflows/pgo-rebuild.sh"
pgo-rebuild-quick = "KANO_CPP_INFRA_PGO_GATHER_QUICK=1 bash scripts/workflows/pgo-rebuild.sh"
pgo-gather-with-coverage = "bash scripts/workflows/pgo-gather-with-coverage.sh"
profile-run-manifest = "bash scripts/stages/profile-run-manifest.sh"

# Canonical coverage workflow: build + gather + report
coverage-all = "bash scripts/workflows/coverage-all.sh"

# Tests
quick-test = "bash scripts/stages/test-lane.sh quick windows-ninja-msvc-release"
test = "bash scripts/stages/test-lane.sh default windows-ninja-msvc-release"
full-test = "bash scripts/stages/test-lane.sh full windows-ninja-msvc-release"

